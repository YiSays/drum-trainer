name: drum_trainer_web
description: "Drum Trainer Web - Professional drum practice tool with AI-powered music analysis"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client for API calls
  http: ^1.2.0

  # State management
  provider: ^6.1.1

  # Audio playback
  just_audio: ^0.9.37
  audio_video_progress_bar: ^2.0.0

  # File picker
  file_picker: ^6.1.1

  # UI components
  flutter_hooks: ^0.20.5
  shimmer: ^3.0.0

  # Platform detection
  universal_platform: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
        - asset: assets/fonts/Inter-SemiBold.ttf
        - asset: assets/fonts/Inter-Bold.ttf
